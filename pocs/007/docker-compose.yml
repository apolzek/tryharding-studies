services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    restart: unless-stopped
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - bigdata-net

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    expose:
      - "29092:29092"
    environment:
      - KAFKA_BROKER_ID_COMMAND="echo $${HOSTNAME##*_}"
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_DELETE_TOPIC_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - ./kafka/kafka-entrypoint.sh:/kafka-entrypoint.sh:ro
      - ./kafka/:/tmp
    command: [ "/kafka-entrypoint.sh" ]
    networks:
      - bigdata-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      - kafka
    networks:
      - bigdata-net

  opentelemetry-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: opentelemetry-collector
    ports:
      - "4317:4317" 
      - "4318:4318" 
      - "9115:9115" 
    volumes:
      - ./otel/config.yaml:/etc/otelcol-contrib/otel-collector-config.yaml
    command: ["--config=/etc/otelcol-contrib/otel-collector-config.yaml"]
    networks:
      - bigdata-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'        
          memory: 512M       
        reservations:
          cpus: '0.1'       
          memory: 128M

  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: flink-connected.Dockerfile
    command: [ "/opt/flink/bin/jobmanager.sh", 'start-foreground' ]
    restart: unless-stopped
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    ports:
      - "8081:8081"  # Flink Web UI
      - "6123:6123"  # RPC port
      - "9249:9249"
    networks:
      - bigdata-net
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./flink/core:/opt/flink/core

  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: flink-connected.Dockerfile
    command: [ "/opt/flink/bin/taskmanager.sh", "start-foreground" ]
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    ports:
      - "9250:9249"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - bigdata-net
    volumes:
      - flink_tm_data:/data
      # - ./data/BGL:/opt/flink/data/BGL
      - ./flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/core:/opt/flink/core

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    networks:
      - bigdata-net

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      # - postgres
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - bigdata-net

networks:
  bigdata-net:
    driver: bridge

volumes:
  flink_tm_data:
  postgres_data:
  grafana_data:
