services:
  whisper-api:
    build: ./whisper-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_COMPUTE: ${WHISPER_COMPUTE:-float16}
    volumes:
      - whisper-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  discord-bot:
    build: ./discord-bot
    restart: unless-stopped
    env_file: ./discord-bot/.env
    environment:
      WHISPER_API_URL: http://whisper-api:8001/transcribe
    volumes:
      - ./discord-bot/recordings:/app/recordings
      - ./discord-bot/messages.log:/app/messages.log
    depends_on:
      whisper-api:
        condition: service_healthy

volumes:
  whisper-cache:
