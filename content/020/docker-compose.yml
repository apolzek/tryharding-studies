services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loandb
      POSTGRES_PASSWORD: loandb
      POSTGRES_DB: loandb
    volumes:
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loandb"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      # 4317 is exposed only inside Docker network for the otel-collector exporter

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver — services send traces here
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # collector self-metrics
      - "8889:8889"   # Prometheus metrics endpoint (scraped by prometheus)
    depends_on:
      - jaeger

  rust-axum:
    build: ./rust-axum
    ports:
      - "8083:8083"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "rust-axum"
      RUST_LOG: "info"
    depends_on:
      - otel-collector

  python-fastapi:
    build: ./python-fastapi
    ports:
      - "8082:8082"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "python-fastapi"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      RUST_AXUM_URL: "http://rust-axum:8083"
      DATABASE_URL: "postgresql://loandb:loandb@postgres:5432/loandb"
    depends_on:
      postgres:
        condition: service_healthy
      rust-axum:
        condition: service_started
      otel-collector:
        condition: service_started

  java-spring:
    build: ./java-spring
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/loandb"
      SPRING_DATASOURCE_USERNAME: "loandb"
      SPRING_DATASOURCE_PASSWORD: "loandb"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "java-spring"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      PYTHON_FASTAPI_URL: "http://python-fastapi:8082"
    depends_on:
      postgres:
        condition: service_healthy
      python-fastapi:
        condition: service_started
      otel-collector:
        condition: service_started

  go-fiber:
    build: ./go-fiber
    ports:
      - "8080:8080"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "go-fiber"
      JAVA_SPRING_URL: "http://java-spring:8081"
    depends_on:
      - java-spring
      - otel-collector

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
