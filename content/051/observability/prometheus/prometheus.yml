global:
  scrape_interval: 2s
  evaluation_interval: 5s
  external_labels:
    stack: otelbench

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: cadvisor
    scrape_interval: 2s
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: otelcol
    scrape_interval: 2s
    static_configs:
      - targets: [collector-grpc:8888]
        labels:
          protocol: grpc
      - targets: [collector-http:8888]
        labels:
          protocol: http
