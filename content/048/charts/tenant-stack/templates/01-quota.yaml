apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
spec:
  hard:
    requests.cpu: {{ .Values.quota.cpu | quote }}
    requests.memory: {{ .Values.quota.memory | quote }}
    limits.cpu: {{ .Values.quota.cpu | quote }}
    limits.memory: {{ .Values.quota.memory | quote }}
    requests.storage: {{ .Values.quota.storage | quote }}
    pods: {{ .Values.quota.pods | quote }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-defaults
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        cpu: {{ .Values.resources.small.limits.cpu | quote }}
        memory: {{ .Values.resources.small.limits.memory | quote }}
      defaultRequest:
        cpu: {{ .Values.resources.small.requests.cpu | quote }}
        memory: {{ .Values.resources.small.requests.memory | quote }}
