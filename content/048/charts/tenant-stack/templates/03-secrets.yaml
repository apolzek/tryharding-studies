apiVersion: v1
kind: Secret
metadata:
  name: tenant-auth
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.tenant.ingestJWT.secret | quote }}
  expected-tid: {{ .Values.tenant.ingestJWT.expectedTid | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-creds
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  user: {{ .Values.clickhouse.user | quote }}
  password: {{ .Values.clickhouse.password | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: {{ .Values.tenant.grafanaAdminPassword | quote }}
