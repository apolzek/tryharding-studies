apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
spec:
  selector: {app: jaeger}
  ports:
    - {name: query,      port: 16686, targetPort: 16686}  # UI + HTTP API
    - {name: otlp-grpc,  port: 4317,  targetPort: 4317}
    - {name: otlp-http,  port: 4318,  targetPort: 4318}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jaeger
  labels: {{- include "tenant-stack.labels" . | nindent 4 }}
spec:
  serviceName: jaeger
  replicas: 1
  selector:
    matchLabels: {app: jaeger}
  template:
    metadata:
      labels:
        app: jaeger
        {{- include "tenant-stack.labels" . | nindent 8 }}
    spec:
      containers:
        - name: jaeger
          image: "{{ .Values.jaeger.image.repository }}:{{ .Values.jaeger.image.tag }}"
          env:
            - {name: SPAN_STORAGE_TYPE, value: "badger"}
            - {name: BADGER_EPHEMERAL,  value: "false"}
            - {name: BADGER_DIRECTORY_VALUE, value: "/badger/data"}
            - {name: BADGER_DIRECTORY_KEY,   value: "/badger/key"}
            - {name: COLLECTOR_OTLP_ENABLED, value: "true"}
          ports:
            - {name: query,     containerPort: 16686}
            - {name: otlp-grpc, containerPort: 4317}
            - {name: otlp-http, containerPort: 4318}
          readinessProbe:
            httpGet: {path: /, port: query}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - {name: data, mountPath: /badger}
          resources:
            requests: {{- toYaml .Values.resources.small.requests | nindent 14 }}
            limits:   {{- toYaml .Values.resources.medium.limits   | nindent 14 }}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.jaeger.storage | quote }}
