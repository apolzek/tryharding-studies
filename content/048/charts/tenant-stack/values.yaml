# All component versions in one place. Upgrade = bump image tag + `helm upgrade`.
# See docs/upgrades.md for the rollout playbook.

tenant:
  id: ""                       # REQUIRED — e.g. "t-01HXYZ..."
  ingestDomain: "localtest.me" # tenant endpoints are <tenant.id>-<svc>.<domain>
  grafanaAdminPassword: ""     # REQUIRED — generated by provisioner
  ingestJWT:
    # HS256 secret shared with control-plane auth-service.
    # Provisioner sets this from env.
    secret: ""
    expectedTid: ""            # must match `tid` claim in JWT

resources:
  # Conservative defaults. Tune by tenant tier in values override.
  small:
    requests: {cpu: "50m", memory: "64Mi"}
    limits:   {cpu: "200m", memory: "256Mi"}
  medium:
    requests: {cpu: "100m", memory: "128Mi"}
    limits:   {cpu: "500m", memory: "512Mi"}
  large:
    requests: {cpu: "200m", memory: "256Mi"}
    limits:   {cpu: "1",    memory: "1Gi"}

quota:
  cpu: "4"
  memory: "6Gi"
  storage: "20Gi"
  pods: "30"

networkPolicy:
  enabled: true
  # When true, tenant pods can reach out to the internet (off for a captive tenant).
  allowEgressInternet: false

collector:
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.115.0"
  authProxy:
    image:
      repository: obs-saas/collector-proxy
      tag: "dev"
      pullPolicy: IfNotPresent
  service:
    otlpHTTP: 4318
    otlpGRPC: 4317
    proxyHTTP: 8443

victoriametrics:
  image:
    repository: victoriametrics/victoria-metrics
    tag: "v1.106.0"
  retention: "30d"
  storage: "5Gi"

jaeger:
  image:
    repository: jaegertracing/all-in-one
    tag: "1.62.0"
  storage: "2Gi"   # badger

clickhouse:
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8.4.13-alpine"
  storage: "10Gi"
  user: "obs"
  # Password is generated per install by the provisioner; surface as a secret.
  password: ""

grafana:
  image:
    repository: grafana/grafana
    tag: "11.3.0"
  storage: "1Gi"
