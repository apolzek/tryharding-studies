global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    experiment: 'cardinality-test'
    mode: 'mitigated'

scrape_configs:
  - job_name: 'genmetrics'
    static_configs:
      - targets: ['genmetrics:8090']
    scrape_interval: 10s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    sample_limit: 5000
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'network_bytes_total|request_latency'
        action: drop

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s
    scrape_timeout: 5s
