## prometheus-community/prometheus-blackbox-exporter
## The Prometheus Operator (shipped by kube-prometheus-stack) manages the
## Probe CRDs that drive this exporter — that is the "operator" wiring.

replicas: 1

serviceMonitor:
  enabled: false  # we don't scrape blackbox itself, we scrape via Probe CRDs

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: [200, 201, 301, 302]
        follow_redirects: true
        preferred_ip_protocol: "ip4"
    http_post_2xx:
      prober: http
      timeout: 5s
      http:
        method: POST
        valid_status_codes: [200, 201, 202]
        preferred_ip_protocol: "ip4"
    tcp_connect:
      prober: tcp
      timeout: 5s
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"
    dns_google:
      prober: dns
      timeout: 5s
      dns:
        query_name: "www.google.com"
        query_type: "A"
        preferred_ip_protocol: "ip4"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  type: ClusterIP
  port: 9115
