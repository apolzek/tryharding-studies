kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: flink-lab
nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
    image: kindest/node:v1.35.1
  - role: worker
    image: kindest/node:v1.35.1
