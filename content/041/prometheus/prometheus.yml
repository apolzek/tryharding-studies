global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    stack: otel-cockpit-041

scrape_configs:
  # Métricas de aplicação (exporter prometheus): count, spanmetrics,
  # servicegraph, hostmetrics, httpcheck.
  - job_name: collector-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector-1:8889
          - otel-collector-2:8889
          - otel-collector-3:8889
          - otel-collector-4:8889
          - otel-collector-5:8889
    relabel_configs:
      - source_labels: [__address__]
        regex: 'otel-collector-(\d+):.*'
        target_label: collector_id
        replacement: '$1'
      - source_labels: [__address__]
        regex: '(.+):.*'
        target_label: instance
        replacement: '$1'

  # Telemetria interna do collector (otelcol_*).
  - job_name: collector-internal
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector-1:8888
          - otel-collector-2:8888
          - otel-collector-3:8888
          - otel-collector-4:8888
          - otel-collector-5:8888
    relabel_configs:
      - source_labels: [__address__]
        regex: 'otel-collector-(\d+):.*'
        target_label: collector_id
        replacement: '$1'
      - source_labels: [__address__]
        regex: '(.+):.*'
        target_label: instance
        replacement: '$1'

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
