# Configuração compartilhada pelos 5 collectors (v0.150.0 contrib).
# Cada collector herda o mesmo arquivo; o rótulo `instance` é atribuído
# pelo Prometheus ao fazer scrape em `otel-collector-N:8889/metrics` e
# `otel-collector-N:8888/metrics` (telemetria interna).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Métricas do host (contrib) — CPU, memória, disco, rede, load, processos.
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      load: {}
      disk: {}
      filesystem: {}
      network: {}
      processes: {}

  # Synthetic monitoring via HTTP check (contrib). Útil para analytics de SLO.
  http_check:
    collection_interval: 30s
    targets:
      - endpoint: https://www.google.com
        method: GET
      - endpoint: https://httpbin.org/status/200
        method: GET

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Detecta atributos do host automaticamente (contrib).
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  # Enriquece recursos com o ID da instância do collector.
  resource:
    attributes:
      - key: collector.id
        value: ${env:COLLECTOR_ID}
        action: upsert
      - key: service.instance.id
        value: ${env:HOSTNAME}
        action: upsert

  # Transform (contrib) — classifica cada log em um bucket de severidade
  # que vira dimensão do count connector (otelpoc.logs.by_severity).
  transform/enrich:
    log_statements:
      - context: log
        statements:
          - set(attributes["severity_bucket"], "info") where severity_number <= 9
          - set(attributes["severity_bucket"], "warn") where severity_number > 9 and severity_number <= 13
          - set(attributes["severity_bucket"], "error") where severity_number > 13

connectors:
  # Count connector (contrib) — contagens ricas de spans, span events, logs,
  # métricas e datapoints, com cortes por atributo.
  count:
    spans:
      # service_name já aparece como label via resource_to_telemetry_conversion,
      # então sum(rate(otelpoc_spans_total)) by (service_name) já cobre o "by service".
      otelpoc.spans.total:
        description: Total de spans processados pelo collector.
      otelpoc.spans.errors:
        description: Spans marcados como erro.
        conditions:
          - status.code == 2
    spanevents:
      otelpoc.spanevents.total:
        description: Total de span events observados.
    logs:
      otelpoc.logs.total:
        description: Total de registros de log.
      otelpoc.logs.by_severity:
        description: Logs por bucket de severidade.
        attributes:
          - key: severity_bucket
            default_value: unknown
    datapoints:
      otelpoc.datapoints.total:
        description: Total de datapoints de métricas recebidos.

  # Spanmetrics connector (contrib) — RED metrics a partir de spans.
  spanmetrics:
    histogram:
      unit: ms
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - name: http.request.method
      - name: http.response.status_code
    exemplars:
      enabled: false
    metrics_flush_interval: 10s
    namespace: traces.spanmetrics

  # Servicegraph connector (contrib) — métricas de topologia de serviços.
  servicegraph:
    latency_histogram_buckets: [1ms, 5ms, 10ms, 50ms, 100ms, 500ms, 1s, 5s]
    dimensions: []
    store:
      ttl: 2s
      max_items: 1000
    cache_loop: 1m
    store_expiration_loop: 2s

exporters:
  # Exporter Prometheus (nativo) — expõe /metrics na 8889.
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: false
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  telemetry:
    logs:
      level: info
    metrics:
      # A telemetria interna do collector (otelcol_*) é exposta na 8888 para
      # o Prometheus coletar diretamente.
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, resource, batch]
      exporters: [spanmetrics, servicegraph, count, debug]
    metrics:
      receivers: [otlp, hostmetrics, http_check, spanmetrics, servicegraph, count]
      processors: [resourcedetection, resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, resource, transform/enrich, batch]
      exporters: [count, debug]
