# Configuração compartilhada pelos 5 collectors (contrib v0.150.1).
# Contém extensões, processors e connectors que dão observabilidade
# sobre o próprio collector: health_check, pprof, zpages, memory_limiter,
# telemetria interna detalhada, spanmetrics, servicegraph, count.

extensions:
  # Endpoint HTTP de liveness/readiness. Prometheus pode usar para blackbox,
  # mas aqui é útil para `docker compose healthcheck` e debug.
  health_check:
    endpoint: 0.0.0.0:13133

  # Profiles Go (heap, goroutine, cpu, mutex) — útil para diagnosticar
  # regressões de CPU/memória no collector:  `go tool pprof http://host:1777/debug/pprof/...`
  pprof:
    endpoint: 0.0.0.0:1777

  # zPages — páginas embutidas de diagnóstico do collector:
  #   http://host:55679/debug/tracez   spans ativos/erro/latency buckets
  #   http://host:55679/debug/pipelinez  componentes por pipeline
  #   http://host:55679/debug/extensionz extensões ativas
  #   http://host:55679/debug/featurez   feature gates
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Hostmetrics (contrib) — observabilidade do host do collector.
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      load: {}
      disk: {}
      filesystem: {}
      network: {}
      processes: {}

  # Synthetic monitoring.
  http_check:
    collection_interval: 30s
    targets:
      - endpoint: https://www.google.com
        method: GET
      - endpoint: https://httpbin.org/status/200
        method: GET

processors:
  # Memory limiter (sempre o PRIMEIRO no pipeline) — aciona backpressure
  # quando ultrapassa 80% do limite; permite observar `otelcol_processor_refused_*`
  # e também expõe `otelcol_process_runtime_*`.
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    send_batch_size: 1024
    timeout: 5s

  # Detecta atributos do host automaticamente.
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  # Adiciona IDs de collector/instance nos recursos.
  resource:
    attributes:
      - key: collector.id
        value: ${env:COLLECTOR_ID}
        action: upsert
      - key: service.instance.id
        value: ${env:HOSTNAME}
        action: upsert

  # Classifica cada log em um bucket de severidade para o count connector.
  transform/enrich:
    log_statements:
      - context: log
        statements:
          - set(attributes["severity_bucket"], "info")  where severity_number <= 9
          - set(attributes["severity_bucket"], "warn")  where severity_number > 9 and severity_number <= 13
          - set(attributes["severity_bucket"], "error") where severity_number > 13

connectors:
  # Count connector — contagens custom de spans, logs e erros.
  count:
    spans:
      otelpoc.spans.total:
        description: Total de spans processados pelo collector.
      otelpoc.spans.errors:
        description: Spans com STATUS_CODE_ERROR.
        conditions:
          - status.code == 2
    spanevents:
      otelpoc.spanevents.total:
        description: Total de span events.
    logs:
      otelpoc.logs.total:
        description: Total de registros de log.
      otelpoc.logs.by_severity:
        description: Logs por bucket de severidade.
        attributes:
          - key: severity_bucket
            default_value: unknown

  # Spanmetrics connector — RED metrics.
  spanmetrics:
    histogram:
      unit: ms
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - name: http.request.method
      - name: http.response.status_code
    exemplars:
      enabled: false
    metrics_flush_interval: 10s
    namespace: traces.spanmetrics

  # Service graph connector — topologia de serviços.
  servicegraph:
    latency_histogram_buckets: [1ms, 5ms, 10ms, 50ms, 100ms, 500ms, 1s, 5s]
    dimensions: []
    store:
      ttl: 2s
      max_items: 1000
    cache_loop: 1m
    store_expiration_loop: 2s

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: false
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    logs:
      level: info
    metrics:
      # `detailed` expõe métricas adicionais por pipeline, por receiver/exporter
      # e por processor — dá granularidade maior no dashboard "internals".
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [spanmetrics, servicegraph, count, debug]
    metrics:
      receivers: [otlp, hostmetrics, http_check, spanmetrics, servicegraph, count]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, transform/enrich, batch]
      exporters: [count, debug]
