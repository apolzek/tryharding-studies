name: otel-cockpit-041

# 5 collectors OpenTelemetry contrib v0.150.1 + Prometheus + Grafana (cockpit
# provisionado com datasource e 3 dashboards custom). Geração de carga com
# telemetrygen. zpages/pprof/health_check habilitados em todos os collectors.

x-collector-base: &collector-base
  image: otel/opentelemetry-collector-contrib:0.150.1
  restart: unless-stopped
  command: ["--config=/etc/otelcol/config.yaml"]
  volumes:
    - ./collectors/collector-config.yaml:/etc/otelcol/config.yaml:ro
  networks: [cockpit]

services:
  otel-collector-1:
    <<: *collector-base
    container_name: otel-collector-1
    hostname: otel-collector-1
    environment:
      COLLECTOR_ID: "1"
    ports:
      - "14317:4317"   # OTLP gRPC
      - "14318:4318"   # OTLP HTTP
      - "18889:8889"   # Prometheus app metrics
      - "18888:8888"   # Prometheus internal metrics
      - "15679:55679"  # zpages (http://localhost:15679/debug/tracez)
      # health_check (13133) e pprof (1777) ficam apenas na rede interna,
      # acessíveis via `docker exec cockpit-loadgen wget -qO- http://otel-collector-1:13133`.

  otel-collector-2:
    <<: *collector-base
    container_name: otel-collector-2
    hostname: otel-collector-2
    environment:
      COLLECTOR_ID: "2"
    ports:
      - "24317:4317"
      - "24318:4318"
      - "28889:8889"
      - "28888:8888"

  otel-collector-3:
    <<: *collector-base
    container_name: otel-collector-3
    hostname: otel-collector-3
    environment:
      COLLECTOR_ID: "3"
    ports:
      - "34317:4317"
      - "34318:4318"
      - "38889:8889"
      - "38888:8888"

  otel-collector-4:
    <<: *collector-base
    container_name: otel-collector-4
    hostname: otel-collector-4
    environment:
      COLLECTOR_ID: "4"
    ports:
      - "44317:4317"
      - "44318:4318"
      - "48889:8889"
      - "48888:8888"

  otel-collector-5:
    <<: *collector-base
    container_name: otel-collector-5
    hostname: otel-collector-5
    environment:
      COLLECTOR_ID: "5"
    ports:
      - "54317:4317"
      - "54318:4318"
      - "58889:8889"
      - "58888:8888"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: cockpit-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=6h
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --enable-feature=otlp-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    networks: [cockpit]
    depends_on:
      - otel-collector-1
      - otel-collector-2
      - otel-collector-3
      - otel-collector-4
      - otel-collector-5

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cockpit-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_PASSWORD: cockpit
      GF_DASHBOARDS_MIN_REFRESH_INTERVAL: 5s
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3041:3000"
    networks: [cockpit]
    depends_on: [prometheus]

  loadgen:
    build: ./loadgen
    container_name: cockpit-loadgen
    restart: unless-stopped
    networks: [cockpit]
    depends_on:
      - otel-collector-1
      - otel-collector-2
      - otel-collector-3
      - otel-collector-4
      - otel-collector-5

networks:
  cockpit:
    driver: bridge
