name: mcp033-pab1it0

services:
  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: mcp033-pab-prom
    ports: ["19091:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.listen-address=0.0.0.0:9090
    networks: [obs]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: mcp033-pab-node
    networks: [obs]

  mcp:
    image: ghcr.io/pab1it0/prometheus-mcp-server:latest
    container_name: mcp033-pab-mcp
    depends_on: [prometheus]
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      PROMETHEUS_MCP_SERVER_TRANSPORT: http
      PROMETHEUS_MCP_BIND_HOST: 0.0.0.0
      PROMETHEUS_MCP_BIND_PORT: "8080"
    ports: ["18081:8080"]
    networks: [obs]

networks:
  obs:
