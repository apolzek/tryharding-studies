apiVersion: v1
kind: Namespace
metadata:
  name: app-canary
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
---
# red — v1 (stable)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v1
  namespace: app-canary
data:
  index.html: |
    <!doctype html><html><head><meta charset="utf-8"><title>canary v1</title>
    <style>html,body{margin:0;height:100%;display:flex;align-items:center;
    justify-content:center;font-family:sans-serif;background:#c62828;color:#fff}
    h1{font-size:6rem}</style></head>
    <body><div><h1>v1 — red</h1><p>canary demo / stable</p></div></body></html>
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;
      access_log off;
      server {
        listen 8080;
        location / { root /usr/share/nginx/html; index index.html; }
        location /healthz { return 200 "ok\n"; }
      }
    }
---
# green — v2
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v2
  namespace: app-canary
data:
  index.html: |
    <!doctype html><html><head><meta charset="utf-8"><title>canary v2</title>
    <style>html,body{margin:0;height:100%;display:flex;align-items:center;
    justify-content:center;font-family:sans-serif;background:#2e7d32;color:#fff}
    h1{font-size:6rem}</style></head>
    <body><div><h1>v2 — green</h1><p>canary demo / new version</p></div></body></html>
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;
      access_log off;
      server {
        listen 8080;
        location / { root /usr/share/nginx/html; index index.html; }
        location /healthz { return 200 "ok\n"; }
      }
    }
---
# soft-broken — v3-soft: pod stays Ready but every request returns 500.
# This is the variant that exercises the RED-metric analysis path.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v3-soft
  namespace: app-canary
data:
  index.html: |
    <h1>broken</h1>
  nginx.conf: |
    pid /tmp/nginx.pid;
    events {}
    http {
      client_body_temp_path /tmp/client_body;
      proxy_temp_path       /tmp/proxy;
      fastcgi_temp_path     /tmp/fastcgi;
      uwsgi_temp_path       /tmp/uwsgi;
      scgi_temp_path        /tmp/scgi;
      access_log off;
      server {
        listen 8080;
        location / { return 500 "oops\n"; }
        location /healthz { return 200 "ok\n"; }
      }
    }
---
# hard-broken — v3-hard: invalid nginx.conf -> CrashLoopBackOff.
# This variant exercises the progressDeadlineAbort path.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-v3-hard
  namespace: app-canary
data:
  index.html: |
    <h1>broken</h1>
  nginx.conf: |
    this is not valid nginx config — syntax error forces crash
---
# Stable Service (managed by the Gateway API traffic-router plugin)
apiVersion: v1
kind: Service
metadata:
  name: nginx-stable
  namespace: app-canary
  labels: { app: nginx-canary }
spec:
  selector:
    app: nginx-canary
  ports:
  - { name: http, port: 80, targetPort: 8080 }
---
# Canary Service (plugin sets its selector to the canary ReplicaSet hash)
apiVersion: v1
kind: Service
metadata:
  name: nginx-canary
  namespace: app-canary
  labels: { app: nginx-canary }
spec:
  selector:
    app: nginx-canary
  ports:
  - { name: http, port: 80, targetPort: 8080 }
---
# Two backendRefs: weight starts 100/0 and the plugin mutates it at each step.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-canary
  namespace: app-canary
spec:
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  hostnames: [canary.local]
  rules:
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: nginx-stable
      port: 80
      weight: 100
    - name: nginx-canary
      port: 80
      weight: 0
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nginx-canary
  namespace: app-canary
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: nginx-canary
---
# AnalysisTemplate — real RED metrics against Envoy Gateway's cluster stats.
# envoy_cluster_name labels are generated by Envoy Gateway as:
#     httproute/<ns>/<route>/rule/<ruleIdx>/backend/<backendIdx>
# The canary backend is backend index 1 in our HTTPRoute. We don't filter by
# rule 0 explicitly so that adding match rules later doesn't silently break
# the query.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: red-metrics
  namespace: app-canary
spec:
  args:
  - name: canary-cluster
    value: "httproute/app-canary/nginx-canary/rule/0/backend/1"
  - name: prom-addr
    value: "http://kps-prometheus.monitoring.svc:9090"
  metrics:
  # R — rate sanity check: the canary backend must be receiving traffic.
  # Guards against a misconfigured HTTPRoute that drops the canary from the
  # load-balancer pool (analysis would otherwise pass vacuously).
  - name: rate-nonzero
    interval: 20s
    count: 3
    failureLimit: 2
    provider:
      prometheus:
        address: "{{args.prom-addr}}"
        query: |
          sum(rate(envoy_cluster_upstream_rq_total{
            envoy_cluster_name="{{args.canary-cluster}}"}[1m])) or vector(0)
    successCondition: result[0] > 0
  # E — error ratio: 5xx / total. Fail hard on the first sample above 5%.
  # NaN (division by zero when rate==0) is tolerated so the rate-nonzero
  # metric is the only thing enforcing traffic presence.
  - name: error-rate
    interval: 20s
    count: 4
    failureLimit: 1
    provider:
      prometheus:
        address: "{{args.prom-addr}}"
        query: |
          (
            sum(rate(envoy_cluster_upstream_rq_xx{
              envoy_response_code_class="5",
              envoy_cluster_name="{{args.canary-cluster}}"}[1m]))
            /
            sum(rate(envoy_cluster_upstream_rq_xx{
              envoy_cluster_name="{{args.canary-cluster}}"}[1m]))
          ) or vector(0)
    successCondition: isNaN(result[0]) || result[0] < 0.05
  # D — p95 latency in milliseconds. Fail on first sample over 500 ms.
  - name: p95-latency-ms
    interval: 20s
    count: 4
    failureLimit: 1
    provider:
      prometheus:
        address: "{{args.prom-addr}}"
        query: |
          histogram_quantile(0.95,
            sum by (le) (rate(envoy_cluster_upstream_rq_time_bucket{
              envoy_cluster_name="{{args.canary-cluster}}"}[1m]))
          ) or vector(0)
    successCondition: isNaN(result[0]) || result[0] < 500
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-canary
  namespace: app-canary
spec:
  replicas: 3
  revisionHistoryLimit: 3
  # Hard-failure safety net: any stuck ReplicaSet aborts after 60s.
  progressDeadlineSeconds: 60
  progressDeadlineAbort: true
  selector:
    matchLabels:
      app: nginx-canary
  template:
    metadata:
      labels:
        app: nginx-canary
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - { name: http, containerPort: 8080 }
        resources:
          requests: { cpu: 20m,  memory: 32Mi }
          limits:   { cpu: 100m, memory: 64Mi }
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
          periodSeconds: 3
          failureThreshold: 2
        livenessProbe:
          httpGet: { path: /healthz, port: 8080 }
          periodSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: [ALL] }
        volumeMounts:
        - { name: html, mountPath: /usr/share/nginx/html }
        - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
        - { name: tmp,  mountPath: /tmp }
        - { name: cache, mountPath: /var/cache/nginx }
      volumes:
      - name: html
        configMap:
          name: nginx-v1
          items: [{ key: index.html, path: index.html }]
      - name: conf
        configMap:
          name: nginx-v1
          items: [{ key: nginx.conf, path: nginx.conf }]
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
  strategy:
    canary:
      stableService: nginx-stable
      canaryService: nginx-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: nginx-canary
            namespace: app-canary
      steps:
      - setWeight: 20
      - pause: { duration: 30s }
      - analysis:
          templates:
          - templateName: red-metrics
      - setWeight: 50
      - pause: { duration: 30s }
      - analysis:
          templates:
          - templateName: red-metrics
      - setWeight: 80
      - pause: { duration: 20s }
