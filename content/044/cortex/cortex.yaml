target: all

auth_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s

blocks_storage:
  backend: filesystem
  tsdb:
    dir: /tmp/cortex/tsdb
  filesystem:
    dir: /tmp/cortex/blocks
  bucket_store:
    sync_dir: /tmp/cortex/sync

compactor:
  data_dir: /tmp/cortex/compactor
  sharding_ring:
    kvstore:
      store: inmemory

store_gateway:
  sharding_ring:
    replication_factor: 1

distributor:
  shard_by_all_labels: true
  pool:
    health_check_ingesters: true

limits:
  ingestion_rate: 10000
  max_global_series_per_user: 100000
