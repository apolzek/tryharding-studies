apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hello
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"   # scale-to-zero
        autoscaling.knative.dev/maxScale: "5"
        autoscaling.knative.dev/target: "50"    # 50 concurrent requests → scale up
    spec:
      containers:
        - image: ghcr.io/knative/helloworld-go:latest
          env:
            - name: TARGET
              value: "SRE Lab"
