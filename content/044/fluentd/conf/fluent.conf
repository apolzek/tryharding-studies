<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type http
  port 9880
  bind 0.0.0.0
</source>

# filtra e enriquece
<filter app.**>
  @type record_transformer
  <record>
    env "production"
    host "${hostname}"
  </record>
</filter>

# rota por tag
<match app.error>
  @type copy
  <store>
    @type file
    path /fluentd/log/error
    append true
    <format>
      @type json
    </format>
    <buffer>
      @type file
      path /fluentd/log/error.buf
      flush_interval 2s
    </buffer>
  </store>
  <store>
    @type stdout
  </store>
</match>

<match app.**>
  @type file
  path /fluentd/log/app
  append true
  <format>
    @type json
  </format>
  <buffer>
    @type file
    path /fluentd/log/app.buf
    flush_interval 5s
  </buffer>
</match>

<match **>
  @type stdout
</match>
