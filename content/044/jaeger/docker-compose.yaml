services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: cncf-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # collector legacy HTTP
      - "6831:6831/udp" # agent compact thrift

  # gera traces de exemplo (HotROD: demo oficial do Jaeger)
  hotrod:
    image: jaegertracing/example-hotrod:1.62.0
    container_name: cncf-hotrod
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    ports:
      - "8080:8080"
    depends_on:
      - jaeger
