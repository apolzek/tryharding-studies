apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-pvc
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: demo-writer
spec:
  serviceName: demo
  replicas: 1
  selector:
    matchLabels: { app: demo-writer }
  template:
    metadata:
      labels: { app: demo-writer }
    spec:
      containers:
        - name: writer
          image: busybox:1.36
          command: ["sh","-c","while true; do date >> /data/log.txt; sleep 2; done"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-pvc
