apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: busy
          image: busybox:1.36
          command: ["sh","-c","while true; do echo processing...; sleep 1; done"]
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-cron
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start:  "*/2 * * * *"    # a cada 2min escala p/ 3
        end:    "1-59/2 * * * *" # no minuto seguinte volta
        desiredReplicas: "3"
