# L3/L4 NetworkPolicy: só pods com label role=client podem falar com o web na porta 80
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-only-client
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: client
      ports:
        - protocol: TCP
          port: 80
