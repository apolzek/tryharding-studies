{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>trynet admin</title>
<style>
  :root { --bg:#0e0f11; --fg:#e6e6e6; --muted:#8a8e93; --acc:#5af08f; --err:#f85c5c; --card:#17191d; --line:#272a30; }
  * { box-sizing:border-box; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif; margin:0; }
  header { padding:16px 24px; border-bottom:1px solid var(--line); display:flex; gap:24px; align-items:center; }
  header strong { font-size:18px; letter-spacing:.5px; }
  nav a { color:var(--fg); text-decoration:none; margin-right:16px; opacity:.75; }
  nav a:hover, nav a.active { color:var(--acc); opacity:1; }
  main { padding:24px; max-width:1100px; margin:0 auto; }
  h1 { margin:.25em 0 .5em; font-size:20px; }
  h2 { font-size:16px; margin:24px 0 8px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:6px; overflow:hidden; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); }
  th { background:#1c1f24; color:var(--muted); font-weight:600; }
  tr:last-child td { border-bottom:none; }
  .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:12px; }
  .pill-on  { background:rgba(90,240,143,.12); color:var(--acc); }
  .pill-off { background:rgba(248,92,92,.12);  color:var(--err); }
  .card { background:var(--card); padding:16px; border-radius:6px; margin-bottom:16px; }
  input, select, textarea, button {
    background:#1c1f24; color:var(--fg); border:1px solid var(--line);
    border-radius:4px; padding:6px 10px; font:inherit;
  }
  textarea { width:100%; min-height:240px; font-family: ui-monospace, Menlo, monospace; font-size:12px; }
  button { cursor:pointer; background:var(--acc); color:#0a0a0a; border:none; font-weight:600; }
  button.secondary { background:transparent; color:var(--fg); border:1px solid var(--line); }
  button.danger { background:var(--err); color:white; }
  form.inline { display:inline; }
  .flash { padding:10px 14px; border-radius:4px; margin-bottom:16px; }
  .flash-ok { background:rgba(90,240,143,.15); color:var(--acc); }
  .flash-err{ background:rgba(248,92,92,.15); color:var(--err); }
  code { background:#0a0b0d; padding:2px 6px; border-radius:3px; font-size:12px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .kv { display:grid; grid-template-columns:160px 1fr; gap:8px; }
  .kv span { color:var(--muted); }
</style>
</head>
<body>
<header>
  <strong>trynet</strong>
  <nav>
    <a href="/"        class="{{if eq .Page "home"}}active{{end}}">overview</a>
    <a href="/nodes"   class="{{if eq .Page "nodes"}}active{{end}}">nodes</a>
    <a href="/keys"    class="{{if eq .Page "keys"}}active{{end}}">auth keys</a>
    <a href="/acls"    class="{{if eq .Page "acls"}}active{{end}}">acls</a>
    <a href="/settings"class="{{if eq .Page "settings"}}active{{end}}">settings</a>
  </nav>
</header>
<main>
{{if .Flash}}<div class="flash flash-ok">{{.Flash}}</div>{{end}}
{{if .Error}}<div class="flash flash-err">{{.Error}}</div>{{end}}
{{template "body" .}}
</main>
</body>
</html>{{end}}
