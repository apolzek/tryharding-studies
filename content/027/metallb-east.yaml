apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: east-pool
  namespace: metallb-system
spec:
  addresses:
    - 172.19.255.100-172.19.255.149
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: east-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - east-pool
