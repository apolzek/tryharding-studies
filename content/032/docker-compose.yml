services:
  face-recognizer:
    build: ./face-recognizer
    image: face-recognizer:local
    container_name: face-recognizer
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      KNOWN_DIR: /data/known_faces
      OUTPUT_DIR: /data/output
      MATCH_THRESHOLD: "0.45"
      YOLO_MODEL: "${YOLO_MODEL:-yolov8s-worldv2.pt}"
      YOLO_CONF: "${YOLO_CONF:-0.10}"
      OBJECT_CLASSES: "${OBJECT_CLASSES:-}"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./known_faces:/data/known_faces
      - ./output:/data/output
      - models:/models
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host

volumes:
  models:
