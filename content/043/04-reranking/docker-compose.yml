services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rrk-qdrant
    restart: unless-stopped
    ports:
      - "16335:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  backend:
    build: ./backend
    container_name: rrk-backend
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      EMBED_MODEL: intfloat/multilingual-e5-small
      RERANKER_MODEL: BAAI/bge-reranker-v2-m3
    ports:
      - "18004:8000"
    restart: unless-stopped
    volumes:
      - hf-cache:/app/.cache/hf
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 300s
      retries: 60

volumes:
  qdrant-data:
  hf-cache:
