<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>01 — Keyword Search (BM25)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #0f1115;
        --panel: #161923;
        --accent: #6ea8fe;
        --muted: #8a93a6;
        --text: #e8ebf2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 24px 32px;
        border-bottom: 1px solid #242938;
      }
      header h1 { margin: 0; font-size: 18px; }
      header .tag {
        display: inline-block;
        margin-right: 8px;
        padding: 2px 8px;
        border-radius: 10px;
        background: #1f2533;
        color: var(--accent);
        font-size: 11px;
        letter-spacing: 0.5px;
      }
      main { max-width: 860px; margin: 24px auto; padding: 0 24px; }
      .search-row { display: flex; gap: 8px; }
      input[type="text"] {
        flex: 1;
        padding: 12px 14px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid #2a3142;
        border-radius: 8px;
        font-size: 15px;
      }
      input[type="text"]:focus { outline: none; border-color: var(--accent); }
      button {
        padding: 12px 18px;
        background: var(--accent);
        color: #0b0d12;
        border: 0;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: wait; }
      .meta { color: var(--muted); font-size: 13px; margin: 12px 4px; }
      .hit {
        background: var(--panel);
        border: 1px solid #242938;
        border-radius: 10px;
        padding: 14px 16px;
        margin-bottom: 10px;
      }
      .hit h3 { margin: 0 0 6px; font-size: 15px; }
      .hit .score {
        float: right;
        font-family: ui-monospace, monospace;
        color: var(--accent);
        font-size: 12px;
      }
      .hit p { margin: 0; color: #c6ccd8; font-size: 14px; line-height: 1.45; }
      .suggestions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .suggestions span {
        padding: 4px 10px;
        background: #1f2533;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        color: var(--muted);
      }
      .suggestions span:hover { color: var(--text); }
      .empty { color: var(--muted); margin-top: 16px; text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <span class="tag">01 / 05</span>
      <h1 style="display: inline">Keyword Search · BM25</h1>
    </header>
    <main>
      <form id="form" class="search-row">
        <input
          id="q"
          type="text"
          placeholder="ex: banco de grafos para detecção de fraude"
          autocomplete="off"
        />
        <button type="submit">Buscar</button>
      </form>
      <div class="suggestions">
        <span>banco em memória para cache</span>
        <span>linguagem compilada com goroutines</span>
        <span>orquestração de containers</span>
        <span>infraestrutura como código declarativa</span>
      </div>
      <div id="meta" class="meta"></div>
      <div id="results"></div>
    </main>
    <script>
      const form = document.getElementById("form");
      const qInput = document.getElementById("q");
      const meta = document.getElementById("meta");
      const results = document.getElementById("results");

      document.querySelectorAll(".suggestions span").forEach((s) => {
        s.addEventListener("click", () => {
          qInput.value = s.textContent;
          form.requestSubmit();
        });
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const q = qInput.value.trim();
        if (!q) return;
        meta.textContent = "Buscando…";
        results.innerHTML = "";
        const t0 = performance.now();
        try {
          const res = await fetch(
            `/search?q=${encodeURIComponent(q)}&k=5`
          );
          const data = await res.json();
          const dt = (performance.now() - t0).toFixed(0);
          meta.textContent = `${data.hits.length} resultado(s) em ${dt}ms — BM25 sobre tokens normalizados.`;
          if (data.hits.length === 0) {
            results.innerHTML =
              '<div class="empty">Sem matches — nenhum token do documento bate com a query.</div>';
            return;
          }
          results.innerHTML = data.hits
            .map(
              (h) => `
              <div class="hit">
                <span class="score">score ${h.score.toFixed(3)}</span>
                <h3>${h.title}</h3>
                <p>${h.content}</p>
              </div>
            `
            )
            .join("");
        } catch (err) {
          meta.textContent = "Erro: " + err.message;
        }
      });
    </script>
  </body>
</html>
