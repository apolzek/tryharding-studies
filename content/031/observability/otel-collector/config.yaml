receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://localhost:5173
            - http://localhost:5174
            - http://localhost:5175
          allowed_headers:
            - "*"
          max_age: 7200

  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector-self
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  resource:
    attributes:
      - key: deployment.environment
        value: poc
        action: upsert
      - key: collector.name
        value: otel-collector
        action: upsert

  transform/promote_ids:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["session.id"], resource.attributes["session.id"]) where resource.attributes["session.id"] != nil
          - set(attributes["user.id"], resource.attributes["user.id"]) where resource.attributes["user.id"] != nil
    log_statements:
      - context: log
        statements:
          - set(attributes["session.id"], resource.attributes["session.id"]) where resource.attributes["session.id"] != nil
          - set(attributes["user.id"], resource.attributes["user.id"]) where resource.attributes["user.id"] != nil
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["session.id"], resource.attributes["session.id"]) where resource.attributes["session.id"] != nil
          - set(attributes["user.id"], resource.attributes["user.id"]) where resource.attributes["user.id"] != nil

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    send_metadata: true
    target_info:
      enabled: true
    resource_to_telemetry_conversion:
      enabled: true
    external_labels:
      cluster: poc-031

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/promote_ids, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, transform/promote_ids, batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, transform/promote_ids, batch]
      exporters: [otlphttp/loki, debug]
