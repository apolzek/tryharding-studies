global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: poc-031
    env: poc

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: backend-api
    metrics_path: /metrics
    static_configs:
      - targets: ["backend-api:8080"]

  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
