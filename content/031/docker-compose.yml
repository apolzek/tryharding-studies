version: "3.9"

networks:
  obs-net:
    driver: bridge
    name: obs-net

volumes:
  prometheus-data: {}
  loki-data: {}
  tempo-data: {}
  grafana-data: {}
  minio-data: {}
  alloy-data: {}

services:
  frontend-react:
    build:
      context: ./frontends/react
      dockerfile: Dockerfile
    image: poc031/frontend-react:latest
    container_name: frontend-react
    ports:
      - "5173:80"
    networks:
      - obs-net
    environment:
      - FARO_URL=http://localhost:12347/collect
      - OTLP_URL=http://localhost:4318
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    labels:
      - "compose_service=frontend-react"

  frontend-vue:
    build:
      context: ./frontends/vue
      dockerfile: Dockerfile
    image: poc031/frontend-vue:latest
    container_name: frontend-vue
    ports:
      - "5174:80"
    networks:
      - obs-net
    environment:
      - FARO_URL=http://localhost:12347/collect
      - OTLP_URL=http://localhost:4318
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    labels:
      - "compose_service=frontend-vue"

  frontend-vanilla:
    build:
      context: ./frontends/vanilla
      dockerfile: Dockerfile
    image: poc031/frontend-vanilla:latest
    container_name: frontend-vanilla
    ports:
      - "5175:80"
    networks:
      - obs-net
    environment:
      - FARO_URL=http://localhost:12347/collect
      - OTLP_URL=http://localhost:4318
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    labels:
      - "compose_service=frontend-vanilla"

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: poc031/backend-api:latest
    container_name: backend-api
    ports:
      - "18080:8080"
    networks:
      - obs-net
    environment:
      - NODE_ENV=production
      - PORT=8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_SERVICE_NAME=backend-api
      - OTEL_RESOURCE_ATTRIBUTES=service.name=backend-api,deployment.environment=poc
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-rrweb-sessions}
      - MINIO_USE_SSL=false
    depends_on:
      otel-collector:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "compose_service=backend-api"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "24317:4317"
      - "24318:4318"
      - "8888:8888"
      - "13133:13133"
    networks:
      - obs-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    labels:
      - "compose_service=otel-collector"

  alloy:
    image: grafana/alloy:v1.4.2
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
      - "12347:12347"
    networks:
      - obs-net
    depends_on:
      loki:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:12345/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "compose_service=alloy"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage,native-histograms
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - obs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "compose_service=prometheus"

  loki:
    image: grafana/loki:3.2.0
    container_name: loki
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - obs-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 15
    restart: unless-stopped
    labels:
      - "compose_service=loki"

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
    networks:
      - obs-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 3s
      retries: 15
    restart: unless-stopped
    labels:
      - "compose_service=tempo"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceQLStreaming metricsSummary
      - GF_INSTALL_PLUGINS=grafana-exploretraces-app
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - obs-net
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "compose_service=grafana"

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - obs-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    labels:
      - "compose_service=minio"
