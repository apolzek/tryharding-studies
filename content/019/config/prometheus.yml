global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "otel-collector-1-internal"
    static_configs:
      - targets: ["otel-collector-1:8888"]
    metrics_path: "/metrics"

  - job_name: "otel-collector-2-internal"
    static_configs:
      - targets: ["otel-collector-2:8888"]
    metrics_path: "/metrics"

  - job_name: "otel-collector-2-pipeline"
    static_configs:
      - targets: ["otel-collector-2:8889"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
