syntax = "proto3";

package product.v1;

option go_package = "github.com/tryharding/057/proto;productv1";

service ProductService {
  rpc GetProduct (GetProductRequest) returns (Product);
  rpc ListProducts (ListProductsRequest) returns (ListProductsResponse);
  rpc CreateProduct (CreateProductRequest) returns (Product);
  rpc DecrementStock (DecrementStockRequest) returns (DecrementStockResponse);
}

message Product {
  string id = 1;
  string sku = 2;
  string name = 3;
  string description = 4;
  double price = 5;
  int32 stock = 6;
  string catalog_id = 7;
}

message GetProductRequest { string id = 1; }
message ListProductsRequest { int32 limit = 1; int32 offset = 2; }
message ListProductsResponse { repeated Product items = 1; int32 total = 2; }
message CreateProductRequest {
  string sku = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string catalog_id = 6;
}
message DecrementStockRequest { string id = 1; int32 quantity = 2; }
message DecrementStockResponse { bool ok = 1; int32 remaining = 2; }
