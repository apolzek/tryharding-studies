name: ms057

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_SAMPLER: always_on

networks:
  mesh:
    driver: bridge

volumes:
  pg-data:
  mongo-data:
  clickhouse-data:
  rabbit-data:
  grafana-data:

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [mesh]

  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    networks: [mesh]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [mesh]

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports: ["5672:5672", "15672:15672", "15692:15692"]
    volumes:
      - rabbit-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [mesh]

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: signatures
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports: ["8123:8123", "9000:9000"]
    volumes: ["clickhouse-data:/var/lib/clickhouse"]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    networks: [mesh]

  # ---------- Observability ----------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infra/otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    networks: [mesh]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "14317:4317"    # OTLP (internal)
    networks: [mesh]

  prometheus:
    image: prom/prometheus:v2.55.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: [mesh]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    ports: ["3001:3000"]
    networks: [mesh]

  # ---------- Services ----------
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      SERVICE_NAME: auth
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8001:8001"]
    networks: [mesh]

  customer:
    build:
      context: ./services/customer
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      SERVICE_NAME: customer
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/customer?sslmode=disable
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports: ["8002:8002"]
    networks: [mesh]

  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: catalog
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: catalog
    depends_on: [mongo]
    ports: ["8003:8003"]
    networks: [mesh]

  product:
    build:
      context: .
      dockerfile: services/product/Dockerfile
    environment:
      <<: *otel-env
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product
      HTTP_PORT: "8004"
      GRPC_PORT: "50051"
      RUST_LOG: info
    depends_on:
      postgres: { condition: service_healthy }
    ports: ["8004:8004", "50051:50051"]
    networks: [mesh]

  signature:
    build:
      context: ./services/signature
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: signature
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: signatures
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      clickhouse: { condition: service_started }
      rabbitmq: { condition: service_healthy }
    ports: ["8005:8005"]
    networks: [mesh]

  order:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: order
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/orderdb
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports: ["8006:8006"]
    networks: [mesh]

  payment:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      SERVICE_NAME: payment
      REDIS_ADDR: redis:6379
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      redis: { condition: service_started }
      rabbitmq: { condition: service_healthy }
    ports: ["8007:8007"]
    networks: [mesh]

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: notification
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["8008:8008"]
    networks: [mesh]

  cart:
    build:
      context: .
      dockerfile: services/cart/Dockerfile
    environment:
      <<: *otel-env
      SERVICE_NAME: cart
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_started }
    ports: ["8009:8009"]
    networks: [mesh]

  # Two BFF replicas behind the Nginx LB.
  bff-1:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    environment: &bff-env
      <<: *otel-env
      SERVICE_NAME: bff
      AUTH_URL: http://auth:8001
      CUSTOMER_URL: http://customer:8002
      CATALOG_URL: http://catalog:8003
      SIGNATURE_URL: http://signature:8005
      ORDER_URL: http://order:8006
      PAYMENT_URL: http://payment:8007
      NOTIFICATION_URL: http://notification:8008
      CART_URL: http://cart:8009
      PRODUCT_GRPC_ADDR: product:50051
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - auth
      - customer
      - catalog
      - product
      - signature
      - order
      - payment
      - notification
      - cart
    networks: [mesh]

  bff-2:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    environment: *bff-env
    depends_on:
      - auth
      - customer
      - catalog
      - product
      - signature
      - order
      - payment
      - notification
      - cart
    networks: [mesh]

  ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    networks: [mesh]

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [bff-1, bff-2, ui]
    ports: ["8090:80"]
    networks: [mesh]

  # ---------- Optional: load testing ----------
  # Run with:  docker compose --profile load run --rm k6 run /scripts/checkout.js
  k6:
    image: grafana/k6:0.53.0
    profiles: ["load"]
    environment:
      BASE: http://nginx
    volumes:
      - ./load:/scripts:ro
    depends_on: [nginx]
    networks: [mesh]
