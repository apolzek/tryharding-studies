worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;

    # --- Rate limiting ----------------------------------------------------
    # Two zones, one for generic API traffic and a tighter one for login.
    limit_req_zone  $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m rate=5r/s;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    upstream bff {
        least_conn;
        server bff-1:3000 max_fails=3 fail_timeout=10s;
        server bff-2:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status ($upstream_addr in ${upstream_response_time}s) '
                    'req=$request_id';
    access_log /var/log/nginx/access.log main;

    # Security defaults
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy no-referrer-when-downgrade;

    server {
        listen 80;

        # SSE live feed — no buffering, very long timeouts.
        location = /api/events {
            proxy_pass http://bff;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            chunked_transfer_encoding off;
        }

        # Tight limit on login specifically (anti-brute-force).
        location = /api/auth/login {
            limit_req zone=login burst=10 nodelay;
            limit_conn conn 20;
            proxy_pass http://bff;
        }

        # Generic API traffic.
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            limit_conn conn 50;
            proxy_pass http://bff;
            proxy_read_timeout 30s;
        }

        location = /health { proxy_pass http://bff; }

        location / {
            proxy_pass http://ui:80/;
        }
    }
}
