receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  kafka/traces:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-traces
    encoding: otlp_proto

  kafka/logs:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-logs
    encoding: otlp_proto

  kafka/metrics:
    protocol_version: 2.6.0
    brokers: [localhost:9092]
    topic: otlp-metrics
    encoding: otlp_proto

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    traces:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [kafka/traces]

    logs:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [kafka/logs]

    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, batch]
      exporters:  [kafka/metrics]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
