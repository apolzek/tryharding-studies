receivers:
  kafka/traces:
    brokers: [kafka:29092]
    group_id: collector-l2-traces
    traces:
      topics:
        - otlp-traces
      encoding: otlp_proto

  kafka/metrics:
    brokers: [kafka:29092]
    group_id: collector-l2-metrics
    metrics:
      topics:
        - otlp-metrics
      encoding: otlp_proto

  kafka/logs:
    brokers: [kafka:29092]
    group_id: collector-l2-logs
    logs:
      topics:
        - otlp-logs
      encoding: otlp_proto

processors:
  resource:
    attributes:
      - action: insert
        key: collector
        value: l2

connectors:
  count:
    spans:
      otlp_telemetry_spans_total:
        description: Total spans processed by collector-l2

exporters:
  file/traces:
    path: /data/traces.jsonl
    rotation:
      max_megabytes: 200
      max_days: 3
      max_backups: 5
      localtime: true
    format: json

  file/metrics:
    path: /data/metrics.jsonl
    rotation:
      max_megabytes: 100
      max_days: 3
      max_backups: 5
      localtime: true
    format: json

  file/logs:
    path: /data/logs.jsonl
    rotation:
      max_megabytes: 100
      max_days: 3
      max_backups: 5
      localtime: true
    format: json

  debug:
    verbosity: normal

  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers:  [kafka/traces]
      processors: [resource]
      exporters:  [debug, count]

    metrics:
      receivers:  [kafka/metrics, count]
      processors: [resource]
      exporters:  [debug]

    logs:
      receivers:  [kafka/logs]
      processors: [resource]
      exporters:  [debug]

  telemetry:
    logs:
      level: warn
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
